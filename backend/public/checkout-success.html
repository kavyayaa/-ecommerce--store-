<!DOCTYPE html>
<html>
<head>
  <title>Order Confirmation</title>
  <link rel="stylesheet" href="/styles.css">

  <style>
    body{
      font-family: Arial;
      background:#f4f6f8;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    .box{
      background:white;
      padding:40px;
      width:400px;
      text-align:center;
      border-radius:10px;
      box-shadow:0 10px 25px rgba(0,0,0,0.1);
    }

    .success{
      color:green;
      font-size:26px;
      margin-bottom:20px;
    }

    .order-info{
      margin-top:20px;
      text-align:left;
    }

    .order-info p{
      margin:8px 0;
    }

    .btn{
      margin-top:20px;
      padding:10px 20px;
      background:black;
      color:white;
      border:none;
      cursor:pointer;
      border-radius:5px;
    }
  </style>

</head>

<body>

<div class="box">

<h2 class="success">✅ Payment Successful</h2>

<p id="paymentStatus">Verifying payment...</p>

<div class="order-info" id="orderInfo" style="display:none">

<p><strong>Order ID:</strong> <span id="orderId"></span></p>

<p><strong>Status:</strong> Paid</p>

</div>

<button class="btn" onclick="window.location.href='/'">
Continue Shopping
</button>

</div>
<script src="/app.js"></script>

<script src="/checkout-success.js"></script>

</body>
</html>
