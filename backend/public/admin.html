<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin |AURA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="topbar" data-testid="admin-topbar">
      <a href="/" class="brand" data-testid="admin-brand-home-link">AURA</a>
      <nav class="nav-links">
        <a class="btn" href="/" data-testid="admin-nav-products-link">Products</a>
        <a class="btn" href="/cart.html" data-testid="admin-nav-cart-link">Cart</a>
        <div id="authNav" data-testid="auth-nav-area"></div>
      </nav>
    </header>

    <main class="container split" data-testid="admin-page">
      <section class="panel">
        <h1 style="font-size: 2rem; margin-bottom: 16px;" data-testid="admin-heading">Admin Panel</h1>
        <form id="productForm" data-testid="admin-product-form">
          <div class="field">
            <label>Name</label>
            <input id="name" required data-testid="admin-product-name-input" />
          </div>
          <div class="field">
            <label>Description</label>
            <textarea id="description" required data-testid="admin-product-description-input"></textarea>
          </div>
          <div class="field">
            <label>Price</label>
            <input id="price" type="number" step="0.01" required data-testid="admin-product-price-input" />
          </div>
          <div class="field">
            <label>Image URL</label>
            <input id="image" required data-testid="admin-product-image-input" />
          </div>
          <div class="field">
            <label>Category</label>
            <input id="category" required data-testid="admin-product-category-input" />
          </div>
          <div class="field">
            <label>Stock</label>
            <input id="stock" type="number" value="1" min="0" required data-testid="admin-product-stock-input" />
          </div>
          <button class="btn btn-accent" type="submit" data-testid="admin-add-product-button">Add product</button>
        </form>
        <div class="status-box" id="adminStatus" data-testid="admin-status-message">Ready</div>
      </section>

      <section class="panel">
        <h2 style="margin-bottom: 12px;" data-testid="admin-products-list-heading">Delete Products</h2>
        <div class="list" id="adminProducts" data-testid="admin-products-list"></div>
      </section>
    </main>

    <script src="/app.js"></script>
    <script src="/scripts/admin.js"></script>
  </body>
</html>
